---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel
  namespace: observability
spec:
  mode: deployment
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.145.0
  env:
    - name: DD_API_KEY
      valueFrom:
        secretKeyRef:
          name: datadog-secret
          key: api-key
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      transform:
        error_mode: ignore
        trace_statements:
          # spanevent context: read event attributes and copy them onto the parent span
          - context: spanevent
            statements:
              # only process the event we care about
              - set(span.attributes["gen_ai.evaluation.score.label"], attributes["gen_ai.evaluation.score.label"])
                where name == "gen_ai.evaluation.result"
              - set(span.attributes["gen_ai.evaluation.score.value"], attributes["gen_ai.evaluation.score.value"])
                where name == "gen_ai.evaluation.result"
      batch:
        timeout: 10s

    connectors:
      datadog/connector:
        traces:
          compute_stats_by_span_kind: true
          compute_top_level_by_span_kind: true
          peer_tags_aggregation: true
      spanmetrics:
        namespace: gen_ai
        histogram:
          explicit:
            buckets: [1]
        dimensions:
          - name: gen_ai.evaluation.score.label   # promoted from event → span attribute
        metrics_flush_interval: 15s

    exporters:
      datadog:
        api:
          key: ${env:DD_API_KEY}
          site: datadoghq.com
      prometheus:
        endpoint: 0.0.0.0:8889

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [transform, batch]
          exporters: [spanmetrics, datadog/connector, datadog]
        metrics:
          receivers: [spanmetrics, datadog/connector]
          processors: [batch]
          exporters: [prometheus, datadog]

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector
  namespace: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  endpoints:
    - port: prometheus
      interval: 3s
