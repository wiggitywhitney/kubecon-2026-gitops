---
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: satisfaction-score-rate-2
spec:
  provider:
    type: prometheus
    address: http://prometheus-prometheus.observability:9090
  query: |
    (
      sum(rate(gen_ai_calls_total{
        span_name="evaluate UserSatisfaction",
        story_name="story-app-2b",
        gen_ai_evaluation_score_label="thumbs_up"
      }[{{ interval }}]))
      /
      (sum(rate(gen_ai_calls_total{
        span_name="evaluate UserSatisfaction",
        story_name="story-app-2b"
      }[{{ interval }}])) > 0)
      -
      sum(rate(gen_ai_calls_total{
        span_name="evaluate UserSatisfaction",
        story_name="story-app-2a",
        gen_ai_evaluation_score_label="thumbs_up"
      }[{{ interval }}]))
      /
      (sum(rate(gen_ai_calls_total{
        span_name="evaluate UserSatisfaction",
        story_name="story-app-2a"
      }[{{ interval }}])) > 0)
    ) * 100
    or on() vector(5)
    # vector(5): when no canary data exists yet (cold-start), return exactly the
    # threshold value so Flagger passes the check and the canary keeps advancing
    # while the audience begins voting. Once real votes flow in, the actual
    # satisfaction delta replaces this fallback.
