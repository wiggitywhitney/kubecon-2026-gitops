---
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: otel-instrumentation
spec:
  exporter:
    endpoint: http://otel-collector.observability:4318   # your Collector's HTTP endpoint

  propagators:
    - tracecontext
    - baggage

  nodejs:
    env:
      - name: OTEL_SERVICE_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.labels['app']   # pulls service.name from the pod label
